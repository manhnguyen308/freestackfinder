<header class="site-header">
  <div class="container">
    <div class="header-inner">

      <a href="/" class="logo" aria-label="{{ .Site.Title }} — Home">
        <span class="logo-text">FreeStack<span class="logo-accent">Finder</span></span>
      </a>

      <a href="/search/" class="nav-search-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </a>

      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="main-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="main-nav" aria-label="Main navigation">
        <ul role="list">
          {{ range .Site.Menus.main }}
          <li {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>
            <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>
      </nav>

    </div>
  </div>
</header>
