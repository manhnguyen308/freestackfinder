<article class="article-card">

  {{ with .Params.image }}
  <a href="{{ $.RelPermalink }}" class="card-image" tabindex="-1" aria-hidden="true">
    <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy" width="400" height="220" />
  </a>
  {{ end }}

  <div class="card-body">

    {{ with .Params.categories }}
    <div class="card-category">
      {{ range first 1 . }}
      <a href="/{{ . | urlize }}/">{{ . }}</a>
      {{ end }}
    </div>
    {{ end }}

    <h3 class="card-title">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </h3>

    <p class="card-excerpt">{{ .Description | default (.Summary | truncate 110) }}</p>

    <div class="card-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
      <span class="read-time">{{ math.Round (div (countwords .Content) 200.0) }} min read</span>
    </div>

  </div>

</article>
